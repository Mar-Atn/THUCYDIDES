<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <title>TTT Style Option D: Terrain Atlas — Middle East Theater Sample</title>
  <defs>
    <!-- Ocean depth gradient -->
    <linearGradient id="depthD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7BAAC8"/>
      <stop offset="40%" stop-color="#5A8AA8"/>
      <stop offset="100%" stop-color="#4A7A98"/>
    </linearGradient>
    <!-- Coastal shallow -->
    <linearGradient id="coastalD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9AC0D8"/>
      <stop offset="100%" stop-color="#7BAAC8"/>
    </linearGradient>
    <!-- Desert stipple pattern -->
    <pattern id="desertStipple" patternUnits="userSpaceOnUse" width="8" height="8">
      <circle cx="2" cy="2" r="0.5" fill="#C8B898" fill-opacity="0.4"/>
      <circle cx="6" cy="6" r="0.5" fill="#C8B898" fill-opacity="0.3"/>
      <circle cx="5" cy="1" r="0.4" fill="#C8B898" fill-opacity="0.35"/>
      <circle cx="1" cy="5" r="0.4" fill="#C8B898" fill-opacity="0.3"/>
    </pattern>
    <!-- Blockade stripe pattern -->
    <pattern id="blockadeD" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#BB3333" stroke-width="1.5" stroke-opacity="0.5"/>
    </pattern>
    <!-- Mountain shadow -->
    <filter id="zoneShadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#5B4B35" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#FAFAF5"/>

  <!-- ============ SEA ZONES with depth ============ -->

  <!-- Arabian Sea (deep) -->
  <path d="M350,300 L500,280 L650,310 L700,400 L650,480 L400,480 L300,450 L280,380 Z"
        fill="url(#depthD)" stroke="none"/>

  <!-- Persian Gulf (shallow) -->
  <path d="M250,230 L340,210 L380,230 L400,260 L380,280 L340,290 L280,280 L240,260 Z"
        fill="url(#coastalD)" stroke="none"/>

  <!-- Red Sea -->
  <path d="M50,200 L80,190 L100,220 L110,300 L100,380 L80,420 L50,400 L40,300 Z"
        fill="url(#coastalD)" stroke="none"/>

  <!-- Mediterranean -->
  <path d="M0,50 L180,30 L200,60 L180,90 L80,100 L0,90 Z"
        fill="url(#depthD)" stroke="none"/>

  <!-- ============ LAND ZONES with terrain ============ -->

  <!-- Phrygia -->
  <path d="M120,30 L200,15 L260,40 L270,80 L240,110 L180,120 L130,105 L100,80 Z"
        fill="#E0D8C8" stroke="#8B7355" stroke-width="1" filter="url(#zoneShadow)"/>
  <!-- Mountain triangles in Phrygia -->
  <polygon points="175,55 180,42 185,55" fill="none" stroke="#A09078" stroke-width="0.8"/>
  <polygon points="195,60 200,47 205,60" fill="none" stroke="#A09078" stroke-width="0.8"/>
  <polygon points="215,65 220,52 225,65" fill="none" stroke="#A09078" stroke-width="0.8"/>

  <!-- Levantia -->
  <path d="M130,120 L170,110 L190,130 L195,180 L175,200 L140,195 L120,170 Z"
        fill="#D0D8C0" stroke="#8B7355" stroke-width="1" filter="url(#zoneShadow)"/>

  <!-- Mesopotamia -->
  <path d="M190,90 L270,80 L310,100 L320,150 L300,180 L240,190 L195,180 L190,130 Z"
        fill="#E8DCC8" stroke="#8B7355" stroke-width="1" filter="url(#zoneShadow)"/>
  <!-- River lines (Tigris-Euphrates suggestion) -->
  <path d="M250,95 Q260,130 265,170" fill="none" stroke="#9AB5C7" stroke-width="1" stroke-opacity="0.5"/>
  <path d="M275,92 Q280,135 278,175" fill="none" stroke="#9AB5C7" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Persia North -->
  <path d="M320,60 L420,40 L480,70 L490,120 L460,150 L380,160 L320,150 L310,100 Z"
        fill="#D8C8B0" stroke="#8B7355" stroke-width="1" filter="url(#zoneShadow)"/>
  <!-- Zagros mountains -->
  <polygon points="340,100 345,88 350,100" fill="none" stroke="#A09078" stroke-width="0.8"/>
  <polygon points="360,95 365,83 370,95" fill="none" stroke="#A09078" stroke-width="0.8"/>
  <polygon points="380,100 385,88 390,100" fill="none" stroke="#A09078" stroke-width="0.8"/>
  <polygon points="400,105 405,93 410,105" fill="none" stroke="#A09078" stroke-width="0.8"/>
  <polygon points="420,95 425,83 430,95" fill="none" stroke="#A09078" stroke-width="0.8"/>

  <!-- Persia West -->
  <path d="M310,150 L380,160 L400,200 L380,230 L340,210 L300,180 Z"
        fill="#D0C0A8" stroke="#8B7355" stroke-width="1" filter="url(#zoneShadow)"/>
  <polygon points="335,180 340,168 345,180" fill="none" stroke="#A09078" stroke-width="0.8"/>
  <polygon points="360,185 365,173 370,185" fill="none" stroke="#A09078" stroke-width="0.8"/>

  <!-- Persia South -->
  <path d="M380,160 L460,150 L500,180 L520,220 L500,260 L440,270 L400,260 L380,230 L400,200 Z"
        fill="#C8B898" stroke="#8B7355" stroke-width="1" filter="url(#zoneShadow)"/>
  <!-- Desert stipple over Persia South -->
  <path d="M380,160 L460,150 L500,180 L520,220 L500,260 L440,270 L400,260 L380,230 L400,200 Z"
        fill="url(#desertStipple)" stroke="none"/>

  <!-- Solaria — Desert territory -->
  <path d="M100,200 L175,200 L240,190 L300,180 L340,210 L340,290 L300,340 L220,380 L140,400 L100,380 L80,300 L80,220 Z"
        fill="#EAD8B8" stroke="#8B7355" stroke-width="1" filter="url(#zoneShadow)"/>
  <!-- Heavy desert stipple -->
  <path d="M100,200 L175,200 L240,190 L300,180 L340,210 L340,290 L300,340 L220,380 L140,400 L100,380 L80,300 L80,220 Z"
        fill="url(#desertStipple)" stroke="none"/>

  <!-- Mirage -->
  <path d="M380,280 L440,270 L470,290 L460,320 L420,330 L380,310 Z"
        fill="#D0D8C8" stroke="#8B7355" stroke-width="1" filter="url(#zoneShadow)"/>

  <!-- Yemen -->
  <path d="M100,380 L140,400 L220,380 L240,410 L200,450 L140,460 L90,440 L80,420 Z"
        fill="#DDD0B8" stroke="#8B7355" stroke-width="1" filter="url(#zoneShadow)"/>
  <!-- Small mountains in Yemen -->
  <polygon points="140,418 145,408 150,418" fill="none" stroke="#A09078" stroke-width="0.7"/>
  <polygon points="160,410 165,400 170,410" fill="none" stroke="#A09078" stroke-width="0.7"/>

  <!-- Horn of Africa -->
  <path d="M40,400 L80,420 L90,440 L140,460 L160,490 L80,500 L0,500 L0,400 Z"
        fill="#D0C8B0" stroke="#8B7355" stroke-width="1" filter="url(#zoneShadow)"/>

  <!-- Bharata -->
  <path d="M560,150 L650,100 L720,120 L780,180 L800,280 L780,380 L720,440 L650,480 L600,430 L570,350 L550,270 L540,200 Z"
        fill="#D0C8D8" stroke="#8B7355" stroke-width="1" filter="url(#zoneShadow)"/>
  <!-- Western Ghats mountains -->
  <polygon points="575,250 580,238 585,250" fill="none" stroke="#A09078" stroke-width="0.7"/>
  <polygon points="580,275 585,263 590,275" fill="none" stroke="#A09078" stroke-width="0.7"/>
  <polygon points="585,300 590,288 595,300" fill="none" stroke="#A09078" stroke-width="0.7"/>
  <!-- Tree clusters (forest indication) -->
  <circle cx="650" cy="200" r="3" fill="none" stroke="#7A9A70" stroke-width="0.6"/>
  <circle cx="656" cy="198" r="3" fill="none" stroke="#7A9A70" stroke-width="0.6"/>
  <circle cx="653" cy="194" r="3" fill="none" stroke="#7A9A70" stroke-width="0.6"/>

  <!-- Central Asia -->
  <path d="M350,0 L500,0 L560,30 L560,80 L480,70 L420,40 L350,30 Z"
        fill="#D8D0C0" stroke="#8B7355" stroke-width="1" filter="url(#zoneShadow)"/>

  <!-- ============ STRAIT OF HORMUZ ============ -->
  <path d="M440,260 L500,260 L520,280 L500,300 L460,310 L440,290 Z"
        fill="url(#coastalD)" stroke="#8B7355" stroke-width="1"/>
  <path d="M440,260 L500,260 L520,280 L500,300 L460,310 L440,290 Z"
        fill="url(#blockadeD)" stroke="none"/>
  <!-- Narrow passage striped markers -->
  <line x1="455" y1="265" x2="455" y2="305" stroke="#BB3333" stroke-width="2" stroke-dasharray="3,3" stroke-opacity="0.6"/>
  <line x1="500" y1="265" x2="500" y2="295" stroke="#BB3333" stroke-width="2" stroke-dasharray="3,3" stroke-opacity="0.6"/>

  <!-- ============ CHOKEPOINT MARKERS ============ -->

  <!-- Gulf Gate passage marker -->
  <text x="478" y="258" font-family="Georgia, serif" font-size="8" fill="#BB3333" text-anchor="middle" font-weight="bold">HORMUZ</text>
  <text x="478" y="310" font-family="Georgia, serif" font-size="7" fill="#BB3333" text-anchor="middle" font-style="italic">Blockaded</text>

  <!-- Bab el-Mandeb passage marker -->
  <line x1="88" y1="425" x2="88" y2="445" stroke="#BB3333" stroke-width="2" stroke-dasharray="3,3" stroke-opacity="0.6"/>
  <line x1="98" y1="420" x2="98" y2="440" stroke="#BB3333" stroke-width="2" stroke-dasharray="3,3" stroke-opacity="0.6"/>
  <text x="108" y="418" font-family="Georgia, serif" font-size="7" fill="#BB3333" text-anchor="start" font-weight="bold">Bab el-Mandeb</text>

  <!-- ============ ZONE LABELS ============ -->

  <text x="190" y="72" font-family="Georgia, serif" font-size="10" fill="#4A3A28" text-anchor="middle" font-style="italic">Phrygia</text>
  <text x="160" y="158" font-family="Georgia, serif" font-size="9" fill="#4A3A28" text-anchor="middle" font-style="italic">Levantia</text>
  <text x="255" y="140" font-family="Georgia, serif" font-size="9" fill="#4A3A28" text-anchor="middle" font-style="italic">Mesopotamia</text>
  <text x="400" y="92" font-family="Georgia, serif" font-size="9" fill="#4A3A28" text-anchor="middle" font-style="italic">Persia North</text>
  <text x="400" y="104" font-family="Georgia, serif" font-size="7" fill="#8B7355" text-anchor="middle">(nuclear complex)</text>
  <text x="345" y="195" font-family="Georgia, serif" font-size="8" fill="#4A3A28" text-anchor="middle" font-style="italic">Persia West</text>
  <text x="450" y="212" font-family="Georgia, serif" font-size="9" fill="#4A3A28" text-anchor="middle" font-style="italic">Persia South</text>
  <text x="200" y="295" font-family="Georgia, serif" font-size="12" fill="#4A3A28" text-anchor="middle" font-style="italic">Solaria</text>
  <text x="430" y="302" font-family="Georgia, serif" font-size="8" fill="#4A3A28" text-anchor="middle" font-style="italic">Mirage</text>
  <text x="170" y="435" font-family="Georgia, serif" font-size="9" fill="#4A3A28" text-anchor="middle" font-style="italic">Yemen</text>
  <text x="75" y="475" font-family="Georgia, serif" font-size="8" fill="#4A3A28" text-anchor="middle" font-style="italic">Horn of Africa</text>
  <text x="665" y="278" font-family="Georgia, serif" font-size="12" fill="#4A3A28" text-anchor="middle" font-style="italic">Bharata</text>

  <!-- Sea labels (italic for sea zones per spec) -->
  <text x="305" y="258" font-family="Georgia, serif" font-size="9" fill="#3A6A8A" text-anchor="middle" font-style="italic">Persian Gulf</text>
  <text x="520" y="398" font-family="Georgia, serif" font-size="11" fill="#3A6A8A" text-anchor="middle" font-style="italic">Arabian Sea</text>
  <text x="68" y="310" font-family="Georgia, serif" font-size="8" fill="#3A6A8A" text-anchor="middle" font-style="italic">Red Sea</text>

  <!-- ============ UNIT DEPLOYMENTS — Flag pennant style ============ -->

  <!-- Persia: 3 ground in South — pennant flag -->
  <line x1="432" y1="240" x2="432" y2="225" stroke="#6B4B35" stroke-width="1"/>
  <polygon points="432,225 448,228 432,231" fill="#C8B898" stroke="#6B4B35" stroke-width="0.5"/>
  <text x="440" y="222" font-family="Georgia, serif" font-size="7" fill="#4A3A28" font-weight="bold">3 GND</text>

  <!-- Persia: 2 air in North — pennant -->
  <line x1="420" y1="120" x2="420" y2="105" stroke="#6B4B35" stroke-width="1"/>
  <polygon points="420,105 436,108 420,111" fill="#C8B898" stroke="#6B4B35" stroke-width="0.5"/>
  <text x="428" y="102" font-family="Georgia, serif" font-size="7" fill="#4A3A28" font-weight="bold">2 AIR</text>

  <!-- Columbia: 2 naval in Arabian Sea — blue pennant -->
  <line x1="560" y1="380" x2="560" y2="365" stroke="#1A3A6A" stroke-width="1"/>
  <polygon points="560,365 576,368 560,371" fill="#B0C4DE" stroke="#1A3A6A" stroke-width="0.5"/>
  <text x="568" y="362" font-family="Georgia, serif" font-size="7" fill="#1A3A6A" font-weight="bold">2 NAV</text>

  <!-- Columbia: 1 ground in Solaria — blue pennant -->
  <line x1="240" y1="330" x2="240" y2="315" stroke="#1A3A6A" stroke-width="1"/>
  <polygon points="240,315 256,318 240,321" fill="#B0C4DE" stroke="#1A3A6A" stroke-width="0.5"/>
  <text x="248" y="312" font-family="Georgia, serif" font-size="7" fill="#1A3A6A" font-weight="bold">1 GND</text>

  <!-- Levantia: 2 ground + 1 air — green pennant -->
  <line x1="155" y1="178" x2="155" y2="160" stroke="#3A5A38" stroke-width="1"/>
  <polygon points="155,160 171,163 155,166" fill="#D0D8C0" stroke="#3A5A38" stroke-width="0.5"/>
  <text x="160" y="155" font-family="Georgia, serif" font-size="7" fill="#3A5A38" font-weight="bold">2G 1A</text>

  <!-- Solaria: 1 ground — sand pennant -->
  <line x1="200" y1="350" x2="200" y2="335" stroke="#6B5B35" stroke-width="1"/>
  <polygon points="200,335 216,338 200,341" fill="#EAD8B8" stroke="#6B5B35" stroke-width="0.5"/>
  <text x="208" y="332" font-family="Georgia, serif" font-size="7" fill="#6B5B35" font-weight="bold">1 GND</text>

  <!-- ============ LEGEND ============ -->
  <rect x="620" y="15" width="170" height="140" fill="#FAFAF5" stroke="#8B7355" stroke-width="0.5" rx="3"/>
  <text x="705" y="32" font-family="Georgia, serif" font-size="10" fill="#4A3A28" text-anchor="middle" font-weight="bold">Legend</text>

  <!-- Terrain indicators -->
  <polygon points="633,45 638,35 643,45" fill="none" stroke="#A09078" stroke-width="0.8"/>
  <text x="655" y="44" font-family="Georgia, serif" font-size="7" fill="#4A3A28">Mountains</text>

  <circle cx="632" cy="55" r="1" fill="#C8B898" fill-opacity="0.6"/>
  <circle cx="637" cy="57" r="1" fill="#C8B898" fill-opacity="0.5"/>
  <circle cx="642" cy="54" r="1" fill="#C8B898" fill-opacity="0.6"/>
  <text x="655" y="58" font-family="Georgia, serif" font-size="7" fill="#4A3A28">Desert</text>

  <circle cx="635" cy="68" r="2" fill="none" stroke="#7A9A70" stroke-width="0.5"/>
  <circle cx="639" cy="66" r="2" fill="none" stroke="#7A9A70" stroke-width="0.5"/>
  <text x="655" y="70" font-family="Georgia, serif" font-size="7" fill="#4A3A28">Forest</text>

  <!-- Chokepoint -->
  <line x1="630" y1="80" x2="630" y2="90" stroke="#BB3333" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="636" y1="78" x2="636" y2="88" stroke="#BB3333" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="655" y="86" font-family="Georgia, serif" font-size="7" fill="#4A3A28">Chokepoint</text>

  <!-- Blockade -->
  <rect x="630" y="95" width="14" height="8" fill="url(#blockadeD)" stroke="#8B7355" stroke-width="0.5"/>
  <text x="655" y="102" font-family="Georgia, serif" font-size="7" fill="#4A3A28">Blockade</text>

  <!-- Pennant flags -->
  <line x1="632" y1="118" x2="632" y2="108" stroke="#6B4B35" stroke-width="1"/>
  <polygon points="632,108 642,110 632,112" fill="#C8B898" stroke="#6B4B35" stroke-width="0.3"/>
  <text x="655" y="114" font-family="Georgia, serif" font-size="7" fill="#4A3A28">Persia Units</text>

  <line x1="632" y1="132" x2="632" y2="122" stroke="#1A3A6A" stroke-width="1"/>
  <polygon points="632,122 642,124 632,126" fill="#B0C4DE" stroke="#1A3A6A" stroke-width="0.3"/>
  <text x="655" y="128" font-family="Georgia, serif" font-size="7" fill="#4A3A28">Columbia Units</text>

  <line x1="632" y1="146" x2="632" y2="136" stroke="#3A5A38" stroke-width="1"/>
  <polygon points="632,136 642,138 632,140" fill="#D0D8C0" stroke="#3A5A38" stroke-width="0.3"/>
  <text x="655" y="142" font-family="Georgia, serif" font-size="7" fill="#4A3A28">Levantia Units</text>

  <!-- Title -->
  <text x="400" y="495" font-family="Georgia, serif" font-size="9" fill="#8B7355" text-anchor="middle" font-style="italic">Thucydides Trap — Style Option D: Terrain Atlas</text>
</svg>