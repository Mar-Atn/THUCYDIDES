<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <title>TTT Style Option B: Strategic Board — Middle East Theater Sample</title>
  <defs>
    <linearGradient id="seaGradB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A7FA5"/>
      <stop offset="100%" stop-color="#3A6F95"/>
    </linearGradient>
    <!-- Wave pattern for sea -->
    <pattern id="wavesB" patternUnits="userSpaceOnUse" width="30" height="10">
      <path d="M0,5 Q7.5,0 15,5 Q22.5,10 30,5" fill="none" stroke="#5A8FB5" stroke-width="0.5" stroke-opacity="0.4"/>
    </pattern>
    <!-- Blockade pattern -->
    <pattern id="blockadeB" patternUnits="userSpaceOnUse" width="12" height="12">
      <line x1="0" y1="0" x2="12" y2="12" stroke="#FF4444" stroke-width="2" stroke-opacity="0.5"/>
      <line x1="12" y1="0" x2="0" y2="12" stroke="#FF4444" stroke-width="2" stroke-opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="500" fill="#1A2A3A"/>

  <!-- ============ SEA ZONES ============ -->

  <!-- Arabian Sea -->
  <path d="M350,300 L500,280 L650,310 L700,400 L650,480 L400,480 L300,450 L280,380 Z"
        fill="url(#seaGradB)" stroke="none"/>
  <path d="M350,300 L500,280 L650,310 L700,400 L650,480 L400,480 L300,450 L280,380 Z"
        fill="url(#wavesB)" stroke="none"/>

  <!-- Persian Gulf -->
  <path d="M250,230 L340,210 L380,230 L400,260 L380,280 L340,290 L280,280 L240,260 Z"
        fill="url(#seaGradB)" stroke="none"/>
  <path d="M250,230 L340,210 L380,230 L400,260 L380,280 L340,290 L280,280 L240,260 Z"
        fill="url(#wavesB)" stroke="none"/>

  <!-- Red Sea -->
  <path d="M50,200 L80,190 L100,220 L110,300 L100,380 L80,420 L50,400 L40,300 Z"
        fill="url(#seaGradB)" stroke="none"/>
  <path d="M50,200 L80,190 L100,220 L110,300 L100,380 L80,420 L50,400 L40,300 Z"
        fill="url(#wavesB)" stroke="none"/>

  <!-- Mediterranean sliver -->
  <path d="M0,50 L180,30 L200,60 L180,90 L80,100 L0,90 Z"
        fill="url(#seaGradB)" stroke="none"/>

  <!-- ============ LAND ZONES (angular/hex-inspired organic shapes) ============ -->

  <!-- Phrygia -->
  <path d="M120,30 L200,18 L260,38 L275,75 L245,108 L185,118 L135,100 L105,75 Z"
        fill="#6B7B6B" stroke="#A0B0B0" stroke-width="1"/>

  <!-- Levantia -->
  <path d="M130,118 L172,108 L192,128 L198,178 L178,198 L142,193 L122,168 Z"
        fill="#7B8B6B" stroke="#A0B0B0" stroke-width="1"/>

  <!-- Mesopotamia -->
  <path d="M192,88 L275,78 L315,98 L325,148 L305,178 L245,188 L198,178 L192,128 Z"
        fill="#9B8B6B" stroke="#A0B0B0" stroke-width="1"/>

  <!-- Persia North (Nuclear) -->
  <path d="M325,58 L425,38 L485,68 L495,118 L465,148 L385,158 L325,148 L315,98 Z"
        fill="#8B6B5B" stroke="#A0B0B0" stroke-width="1"/>

  <!-- Persia West -->
  <path d="M315,148 L385,158 L405,198 L385,228 L345,208 L305,178 Z"
        fill="#7B5B4B" stroke="#A0B0B0" stroke-width="1"/>

  <!-- Persia South -->
  <path d="M385,158 L465,148 L505,178 L525,218 L505,258 L445,268 L405,258 L385,228 L405,198 Z"
        fill="#6B4B3B" stroke="#A0B0B0" stroke-width="1"/>

  <!-- Solaria -->
  <path d="M100,200 L178,198 L245,188 L305,178 L345,208 L345,288 L305,338 L225,378 L145,398 L100,378 L82,298 L82,218 Z"
        fill="#8B7B5B" stroke="#A0B0B0" stroke-width="1"/>

  <!-- Mirage -->
  <path d="M385,278 L445,268 L475,288 L465,318 L425,328 L385,308 Z"
        fill="#5B7B7B" stroke="#A0B0B0" stroke-width="1"/>

  <!-- Yemen -->
  <path d="M100,378 L145,398 L225,378 L245,408 L205,448 L145,458 L95,438 L82,418 Z"
        fill="#7B6B5B" stroke="#A0B0B0" stroke-width="1"/>

  <!-- Horn of Africa -->
  <path d="M42,398 L82,418 L95,438 L145,458 L165,488 L82,500 L0,500 L0,398 Z"
        fill="#6B5B4B" stroke="#A0B0B0" stroke-width="1"/>

  <!-- Bharata -->
  <path d="M565,148 L655,98 L725,118 L785,178 L800,278 L785,378 L725,438 L655,478 L605,428 L575,348 L555,268 L545,198 Z"
        fill="#5B6B8B" stroke="#A0B0B0" stroke-width="1"/>

  <!-- Central Asia sliver -->
  <path d="M355,0 L505,0 L565,28 L565,78 L485,68 L425,38 L355,28 Z"
        fill="#5B5B4B" stroke="#A0B0B0" stroke-width="1"/>

  <!-- ============ STRAIT OF HORMUZ ============ -->
  <path d="M445,258 L505,258 L525,278 L505,298 L465,308 L445,288 Z"
        fill="#4A7FA5" stroke="#A0B0B0" stroke-width="1"/>
  <!-- Blockade overlay -->
  <path d="M445,258 L505,258 L525,278 L505,298 L465,308 L445,288 Z"
        fill="url(#blockadeB)" stroke="none"/>

  <!-- ============ CHOKEPOINT MARKERS — Anchor icons ============ -->

  <!-- Gulf Gate anchor -->
  <g transform="translate(485,278)">
    <circle r="3" fill="none" stroke="#FF6644" stroke-width="1.5"/>
    <line x1="0" y1="3" x2="0" y2="12" stroke="#FF6644" stroke-width="1.5"/>
    <path d="M-5,12 Q0,17 5,12" fill="none" stroke="#FF6644" stroke-width="1.5"/>
    <line x1="-2" y1="7" x2="2" y2="7" stroke="#FF6644" stroke-width="1.5"/>
  </g>
  <text x="485" y="265" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#FF6644" text-anchor="middle" font-weight="bold">HORMUZ</text>
  <text x="485" y="300" font-family="Helvetica, Arial, sans-serif" font-size="7" fill="#FF4444" text-anchor="middle" font-weight="bold" letter-spacing="2">BLOCKED</text>

  <!-- Bab el-Mandeb anchor -->
  <g transform="translate(105,430)">
    <circle r="3" fill="none" stroke="#FF6644" stroke-width="1.5"/>
    <line x1="0" y1="3" x2="0" y2="10" stroke="#FF6644" stroke-width="1.5"/>
    <path d="M-4,10 Q0,14 4,10" fill="none" stroke="#FF6644" stroke-width="1.5"/>
  </g>
  <text x="105" y="418" font-family="Helvetica, Arial, sans-serif" font-size="7" fill="#FF6644" text-anchor="middle" font-weight="bold">BAB EL-MANDEB</text>

  <!-- ============ ZONE LABELS ============ -->
  <text x="192" y="72" font-family="Helvetica, sans-serif" font-size="10" fill="#D0D8D0" text-anchor="middle" font-weight="bold">PHRYGIA</text>
  <text x="162" y="158" font-family="Helvetica, sans-serif" font-size="9" fill="#D0D8D0" text-anchor="middle" font-weight="bold">LEVANTIA</text>
  <text x="260" y="140" font-family="Helvetica, sans-serif" font-size="9" fill="#D0D8D0" text-anchor="middle" font-weight="bold">MESOPOTAMIA</text>
  <text x="405" y="92" font-family="Helvetica, sans-serif" font-size="9" fill="#D0D8D0" text-anchor="middle" font-weight="bold">PERSIA NORTH</text>
  <text x="405" y="103" font-family="Helvetica, sans-serif" font-size="7" fill="#A0A8A0" text-anchor="middle">[Nuclear Sites]</text>
  <text x="350" y="195" font-family="Helvetica, sans-serif" font-size="8" fill="#D0D8D0" text-anchor="middle" font-weight="bold">PERSIA W.</text>
  <text x="455" y="212" font-family="Helvetica, sans-serif" font-size="9" fill="#D0D8D0" text-anchor="middle" font-weight="bold">PERSIA SOUTH</text>
  <text x="210" y="295" font-family="Helvetica, sans-serif" font-size="12" fill="#D0D8D0" text-anchor="middle" font-weight="bold">SOLARIA</text>
  <text x="435" y="302" font-family="Helvetica, sans-serif" font-size="8" fill="#D0D8D0" text-anchor="middle" font-weight="bold">MIRAGE</text>
  <text x="175" y="432" font-family="Helvetica, sans-serif" font-size="9" fill="#D0D8D0" text-anchor="middle" font-weight="bold">YEMEN</text>
  <text x="75" y="475" font-family="Helvetica, sans-serif" font-size="8" fill="#D0D8D0" text-anchor="middle" font-weight="bold">HORN OF AFRICA</text>
  <text x="665" y="278" font-family="Helvetica, sans-serif" font-size="12" fill="#D0D8D0" text-anchor="middle" font-weight="bold">BHARATA</text>

  <!-- Sea labels -->
  <text x="305" y="258" font-family="Helvetica, sans-serif" font-size="8" fill="#8AAFCF" text-anchor="middle" font-style="italic">Persian Gulf</text>
  <text x="525" y="398" font-family="Helvetica, sans-serif" font-size="10" fill="#8AAFCF" text-anchor="middle" font-style="italic">Arabian Sea</text>
  <text x="68" y="312" font-family="Helvetica, sans-serif" font-size="8" fill="#8AAFCF" text-anchor="middle" font-style="italic">Red Sea</text>

  <!-- ============ UNIT DEPLOYMENTS — Token/chip style ============ -->

  <!-- Persia: 3 ground in South -->
  <rect x="418" y="228" width="28" height="16" rx="3" fill="#6B4B3B" stroke="#E0C8A0" stroke-width="1.5"/>
  <text x="426" y="240" font-family="Helvetica, sans-serif" font-size="7" fill="#E0C8A0">G</text>
  <text x="438" y="240" font-family="Helvetica, sans-serif" font-size="9" fill="#E0C8A0" font-weight="bold">3</text>

  <!-- Persia: 2 air in North -->
  <rect x="408" y="108" width="28" height="16" rx="3" fill="#8B6B5B" stroke="#E0C8A0" stroke-width="1.5"/>
  <text x="416" y="120" font-family="Helvetica, sans-serif" font-size="7" fill="#E0C8A0">A</text>
  <text x="428" y="120" font-family="Helvetica, sans-serif" font-size="9" fill="#E0C8A0" font-weight="bold">2</text>

  <!-- Columbia: 2 naval in Arabian Sea -->
  <rect x="548" y="362" width="28" height="16" rx="3" fill="#2A4A6A" stroke="#90B8E0" stroke-width="1.5"/>
  <text x="556" y="374" font-family="Helvetica, sans-serif" font-size="7" fill="#90B8E0">N</text>
  <text x="568" y="374" font-family="Helvetica, sans-serif" font-size="9" fill="#90B8E0" font-weight="bold">2</text>

  <!-- Columbia: 1 ground in Solaria -->
  <rect x="228" y="315" width="28" height="16" rx="3" fill="#2A4A6A" stroke="#90B8E0" stroke-width="1.5"/>
  <text x="236" y="327" font-family="Helvetica, sans-serif" font-size="7" fill="#90B8E0">G</text>
  <text x="248" y="327" font-family="Helvetica, sans-serif" font-size="9" fill="#90B8E0" font-weight="bold">1</text>

  <!-- Levantia: 2 ground + 1 air -->
  <rect x="138" y="168" width="28" height="16" rx="3" fill="#7B8B6B" stroke="#D0E0C0" stroke-width="1.5"/>
  <text x="146" y="180" font-family="Helvetica, sans-serif" font-size="7" fill="#D0E0C0">G</text>
  <text x="158" y="180" font-family="Helvetica, sans-serif" font-size="9" fill="#D0E0C0" font-weight="bold">2</text>

  <rect x="168" y="168" width="28" height="16" rx="3" fill="#7B8B6B" stroke="#D0E0C0" stroke-width="1.5"/>
  <text x="176" y="180" font-family="Helvetica, sans-serif" font-size="7" fill="#D0E0C0">A</text>
  <text x="188" y="180" font-family="Helvetica, sans-serif" font-size="9" fill="#D0E0C0" font-weight="bold">1</text>

  <!-- Solaria: 1 ground -->
  <rect x="188" y="338" width="28" height="16" rx="3" fill="#8B7B5B" stroke="#E0D8C0" stroke-width="1.5"/>
  <text x="196" y="350" font-family="Helvetica, sans-serif" font-size="7" fill="#E0D8C0">G</text>
  <text x="208" y="350" font-family="Helvetica, sans-serif" font-size="9" fill="#E0D8C0" font-weight="bold">1</text>

  <!-- ============ LEGEND ============ -->
  <rect x="620" y="15" width="170" height="130" fill="#1A2A3A" stroke="#A0B0B0" stroke-width="0.5" rx="4"/>
  <text x="705" y="32" font-family="Helvetica, sans-serif" font-size="10" fill="#D0D8D0" text-anchor="middle" font-weight="bold">LEGEND</text>

  <g transform="translate(638,42)">
    <circle r="3" fill="none" stroke="#FF6644" stroke-width="1"/>
    <line x1="0" y1="3" x2="0" y2="8" stroke="#FF6644" stroke-width="1"/>
  </g>
  <text x="655" y="46" font-family="Helvetica, sans-serif" font-size="8" fill="#D0D8D0">Chokepoint</text>

  <rect x="630" y="55" width="18" height="10" fill="url(#blockadeB)" stroke="#A0B0B0" stroke-width="0.5"/>
  <text x="655" y="63" font-family="Helvetica, sans-serif" font-size="8" fill="#D0D8D0">Blockade Active</text>

  <rect x="628" y="72" width="22" height="12" rx="2" fill="#6B4B3B" stroke="#E0C8A0" stroke-width="1"/>
  <text x="655" y="82" font-family="Helvetica, sans-serif" font-size="8" fill="#D0D8D0">Persia Token</text>

  <rect x="628" y="92" width="22" height="12" rx="2" fill="#2A4A6A" stroke="#90B8E0" stroke-width="1"/>
  <text x="655" y="102" font-family="Helvetica, sans-serif" font-size="8" fill="#D0D8D0">Columbia Token</text>

  <rect x="628" y="112" width="22" height="12" rx="2" fill="#7B8B6B" stroke="#D0E0C0" stroke-width="1"/>
  <text x="655" y="122" font-family="Helvetica, sans-serif" font-size="8" fill="#D0D8D0">Levantia Token</text>

  <rect x="628" y="132" width="22" height="12" rx="2" fill="#8B7B5B" stroke="#E0D8C0" stroke-width="1"/>
  <text x="655" y="142" font-family="Helvetica, sans-serif" font-size="8" fill="#D0D8D0">Solaria Token</text>

  <!-- Title -->
  <text x="400" y="495" font-family="Helvetica, sans-serif" font-size="9" fill="#607080" text-anchor="middle">THUCYDIDES TRAP — Style Option B: Strategic Board</text>
</svg>