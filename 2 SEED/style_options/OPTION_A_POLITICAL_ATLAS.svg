<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <title>TTT Style Option A: Political Atlas — Middle East Theater Sample</title>
  <defs>
    <linearGradient id="coastGradA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9BC2DE"/>
      <stop offset="100%" stop-color="#7BA7CC"/>
    </linearGradient>
    <linearGradient id="deepSeaA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7BA7CC"/>
      <stop offset="100%" stop-color="#6A96BB"/>
    </linearGradient>
    <!-- Blockade hatch pattern -->
    <pattern id="blockadeHatchA" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#CC3333" stroke-width="1.5" stroke-opacity="0.6"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#F5F5F5"/>

  <!-- ============ SEA ZONES ============ -->

  <!-- Arabian Sea (large, right-center) -->
  <path d="M350,300 L500,280 L650,310 L700,400 L650,480 L400,480 L300,450 L280,380 Z"
        fill="url(#deepSeaA)" stroke="none"/>

  <!-- Persian Gulf (narrow body between Persia south and Solaria/Mirage) -->
  <path d="M250,230 L340,210 L380,230 L400,260 L380,280 L340,290 L280,280 L240,260 Z"
        fill="url(#coastGradA)" stroke="none"/>

  <!-- Red Sea (far left) -->
  <path d="M50,200 L80,190 L100,220 L110,300 L100,380 L80,420 L50,400 L40,300 Z"
        fill="url(#coastGradA)" stroke="none"/>

  <!-- Mediterranean sliver (top-left) -->
  <path d="M0,50 L180,30 L200,60 L180,90 L80,100 L0,90 Z"
        fill="url(#coastGradA)" stroke="none"/>

  <!-- ============ LAND ZONES ============ -->

  <!-- Phrygia (northwest corner - Turkey) -->
  <path d="M120,30 L200,15 L260,40 L270,80 L240,110 L180,120 L130,105 L100,80 Z"
        fill="#E8D5E0" stroke="#333333" stroke-width="1.5"/>

  <!-- Levantia (Israel/Palestine area) -->
  <path d="M130,120 L170,110 L190,130 L195,180 L175,200 L140,195 L120,170 Z"
        fill="#C8D8C0" stroke="#333333" stroke-width="1.5"/>

  <!-- Mesopotamia / Syria-Iraq corridor -->
  <path d="M190,90 L270,80 L310,100 L320,150 L300,180 L240,190 L195,180 L190,130 Z"
        fill="#F0E6D0" stroke="#333333" stroke-width="1.5"/>

  <!-- Persia North (Nuclear Sites) -->
  <path d="M320,60 L420,40 L480,70 L490,120 L460,150 L380,160 L320,150 L310,100 Z"
        fill="#E0C8B0" stroke="#333333" stroke-width="1.5"/>

  <!-- Persia West (Corridor) -->
  <path d="M310,150 L380,160 L400,200 L380,230 L340,210 L300,180 Z"
        fill="#D8C0A8" stroke="#333333" stroke-width="1.5"/>

  <!-- Persia South (Coast / Hormuz Defense) -->
  <path d="M380,160 L460,150 L500,180 L520,220 L500,260 L440,270 L400,260 L380,230 L400,200 Z"
        fill="#D0B898" stroke="#333333" stroke-width="1.5"/>

  <!-- Solaria (Saudi Arabia - large) -->
  <path d="M100,200 L175,200 L240,190 L300,180 L340,210 L340,290 L300,340 L220,380 L140,400 L100,380 L80,300 L80,220 Z"
        fill="#F5E6D0" stroke="#333333" stroke-width="1.5"/>

  <!-- Mirage (UAE - small) -->
  <path d="M380,280 L440,270 L470,290 L460,320 L420,330 L380,310 Z"
        fill="#D0E0D8" stroke="#333333" stroke-width="1.5"/>

  <!-- Yemen / Bab el-Mandeb -->
  <path d="M100,380 L140,400 L220,380 L240,410 L200,450 L140,460 L90,440 L80,420 Z"
        fill="#E8D8C8" stroke="#333333" stroke-width="1.5"/>

  <!-- Horn of Africa -->
  <path d="M40,400 L80,420 L90,440 L140,460 L160,490 L80,500 L0,500 L0,400 Z"
        fill="#D8C8B8" stroke="#333333" stroke-width="1.5"/>

  <!-- Bharata (India - partial western edge) -->
  <path d="M560,150 L650,100 L720,120 L780,180 L800,280 L780,380 L720,440 L650,480 L600,430 L570,350 L550,270 L540,200 Z"
        fill="#E0D0E0" stroke="#333333" stroke-width="1.5"/>

  <!-- Central Asia sliver (top) -->
  <path d="M350,0 L500,0 L560,30 L560,80 L480,70 L420,40 L350,30 Z"
        fill="#E8E0D0" stroke="#333333" stroke-width="1.5"/>

  <!-- ============ STRAIT OF HORMUZ (chokepoint sea zone) ============ -->
  <path d="M440,260 L500,260 L520,280 L500,300 L460,310 L440,290 Z"
        fill="#7BA7CC" stroke="#333333" stroke-width="1.5"/>

  <!-- Hormuz BLOCKED indicator - hatching overlay -->
  <path d="M440,260 L500,260 L520,280 L500,300 L460,310 L440,290 Z"
        fill="url(#blockadeHatchA)" stroke="none"/>

  <!-- ============ CHOKEPOINT MARKERS ============ -->

  <!-- Hormuz diamond marker -->
  <polygon points="480,280 490,270 500,280 490,290" fill="#CC3333" stroke="#991111" stroke-width="1"/>
  <text x="480" y="265" font-family="Georgia, serif" font-size="8" fill="#CC3333" text-anchor="middle" font-weight="bold">HORMUZ</text>
  <text x="480" y="305" font-family="Georgia, serif" font-size="7" fill="#CC3333" text-anchor="middle" font-style="italic">BLOCKED</text>

  <!-- Bab el-Mandeb diamond marker -->
  <polygon points="95,430 105,420 115,430 105,440" fill="#CC3333" stroke="#991111" stroke-width="1"/>
  <text x="105" y="415" font-family="Georgia, serif" font-size="8" fill="#CC3333" text-anchor="middle" font-weight="bold">BAB EL-MANDEB</text>

  <!-- ============ ZONE LABELS ============ -->

  <!-- Land zone labels -->
  <text x="190" y="75" font-family="Georgia, serif" font-size="10" fill="#333" text-anchor="middle" font-variant="small-caps">Phrygia</text>
  <text x="160" y="160" font-family="Georgia, serif" font-size="10" fill="#333" text-anchor="middle" font-variant="small-caps">Levantia</text>
  <text x="255" y="140" font-family="Georgia, serif" font-size="10" fill="#333" text-anchor="middle" font-variant="small-caps">Mesopotamia</text>
  <text x="400" y="95" font-family="Georgia, serif" font-size="10" fill="#333" text-anchor="middle" font-variant="small-caps">Persia North</text>
  <text x="390" y="88" font-family="Georgia, serif" font-size="7" fill="#666" text-anchor="middle" font-style="italic">(nuclear sites)</text>
  <text x="345" y="195" font-family="Georgia, serif" font-size="9" fill="#333" text-anchor="middle" font-variant="small-caps">Persia West</text>
  <text x="450" y="215" font-family="Georgia, serif" font-size="10" fill="#333" text-anchor="middle" font-variant="small-caps">Persia South</text>
  <text x="200" y="300" font-family="Georgia, serif" font-size="12" fill="#333" text-anchor="middle" font-variant="small-caps">Solaria</text>
  <text x="430" y="305" font-family="Georgia, serif" font-size="9" fill="#333" text-anchor="middle" font-variant="small-caps">Mirage</text>
  <text x="170" y="435" font-family="Georgia, serif" font-size="9" fill="#333" text-anchor="middle" font-variant="small-caps">Yemen</text>
  <text x="70" y="470" font-family="Georgia, serif" font-size="9" fill="#333" text-anchor="middle" font-variant="small-caps">Horn of Africa</text>
  <text x="660" y="280" font-family="Georgia, serif" font-size="12" fill="#333" text-anchor="middle" font-variant="small-caps">Bharata</text>

  <!-- Sea zone labels -->
  <text x="300" y="255" font-family="Georgia, serif" font-size="9" fill="#3A6A8A" text-anchor="middle" font-style="italic">Persian Gulf</text>
  <text x="520" y="400" font-family="Georgia, serif" font-size="11" fill="#3A6A8A" text-anchor="middle" font-style="italic">Arabian Sea</text>
  <text x="65" y="310" font-family="Georgia, serif" font-size="9" fill="#3A6A8A" text-anchor="middle" font-style="italic">Red Sea</text>

  <!-- ============ UNIT DEPLOYMENTS ============ -->

  <!-- Persia: 3 ground units in South (Hormuz defense) -->
  <circle cx="430" cy="235" r="10" fill="#D0B898" stroke="#333" stroke-width="1"/>
  <text x="430" y="239" font-family="Georgia, serif" font-size="9" fill="#333" text-anchor="middle" font-weight="bold">3</text>
  <text x="445" y="248" font-family="Georgia, serif" font-size="6" fill="#666">GND</text>

  <!-- Persia: 2 tactical air in North -->
  <circle cx="420" cy="110" r="10" fill="#D0B898" stroke="#333" stroke-width="1"/>
  <text x="420" y="114" font-family="Georgia, serif" font-size="9" fill="#333" text-anchor="middle" font-weight="bold">2</text>
  <text x="435" y="123" font-family="Georgia, serif" font-size="6" fill="#666">AIR</text>

  <!-- Columbia: 2 naval in Arabian Sea -->
  <circle cx="560" cy="370" r="10" fill="#B0C4DE" stroke="#1A3A6A" stroke-width="1.5"/>
  <text x="560" y="374" font-family="Georgia, serif" font-size="9" fill="#1A3A6A" text-anchor="middle" font-weight="bold">2</text>
  <text x="575" y="383" font-family="Georgia, serif" font-size="6" fill="#1A3A6A">NAV</text>

  <!-- Columbia: 1 ground in Solaria (base) -->
  <circle cx="240" cy="320" r="10" fill="#B0C4DE" stroke="#1A3A6A" stroke-width="1.5"/>
  <text x="240" y="324" font-family="Georgia, serif" font-size="9" fill="#1A3A6A" text-anchor="middle" font-weight="bold">1</text>
  <text x="255" y="333" font-family="Georgia, serif" font-size="6" fill="#1A3A6A">GND</text>

  <!-- Levantia: 2 ground, 1 tactical air -->
  <circle cx="150" cy="175" r="10" fill="#C8D8C0" stroke="#333" stroke-width="1"/>
  <text x="150" y="179" font-family="Georgia, serif" font-size="9" fill="#333" text-anchor="middle" font-weight="bold">2</text>
  <text x="165" y="188" font-family="Georgia, serif" font-size="6" fill="#666">GND</text>
  <circle cx="175" cy="175" r="10" fill="#C8D8C0" stroke="#333" stroke-width="1"/>
  <text x="175" y="179" font-family="Georgia, serif" font-size="9" fill="#333" text-anchor="middle" font-weight="bold">1</text>
  <text x="190" y="188" font-family="Georgia, serif" font-size="6" fill="#666">AIR</text>

  <!-- Solaria: 1 ground -->
  <circle cx="200" cy="340" r="10" fill="#F5E6D0" stroke="#333" stroke-width="1"/>
  <text x="200" y="344" font-family="Georgia, serif" font-size="9" fill="#333" text-anchor="middle" font-weight="bold">1</text>
  <text x="215" y="353" font-family="Georgia, serif" font-size="6" fill="#666">GND</text>

  <!-- ============ LEGEND ============ -->
  <rect x="620" y="15" width="170" height="130" fill="#F5F5F5" stroke="#333" stroke-width="0.5" rx="3"/>
  <text x="705" y="32" font-family="Georgia, serif" font-size="10" fill="#333" text-anchor="middle" font-weight="bold">LEGEND</text>

  <polygon points="633,42 639,36 645,42 639,48" fill="#CC3333" stroke="#991111" stroke-width="0.5"/>
  <text x="655" y="46" font-family="Georgia, serif" font-size="8" fill="#333">Chokepoint</text>

  <rect x="630" y="55" width="18" height="10" fill="url(#blockadeHatchA)" stroke="#333" stroke-width="0.5"/>
  <text x="655" y="63" font-family="Georgia, serif" font-size="8" fill="#333">Blockade Active</text>

  <circle cx="639" cy="78" r="7" fill="#D0B898" stroke="#333" stroke-width="1"/>
  <text x="639" y="81" font-family="Georgia, serif" font-size="7" fill="#333" text-anchor="middle">3</text>
  <text x="655" y="82" font-family="Georgia, serif" font-size="8" fill="#333">Persia Units</text>

  <circle cx="639" cy="98" r="7" fill="#B0C4DE" stroke="#1A3A6A" stroke-width="1"/>
  <text x="639" y="101" font-family="Georgia, serif" font-size="7" fill="#1A3A6A" text-anchor="middle">2</text>
  <text x="655" y="102" font-family="Georgia, serif" font-size="8" fill="#333">Columbia Units</text>

  <circle cx="639" cy="118" r="7" fill="#C8D8C0" stroke="#333" stroke-width="1"/>
  <text x="639" y="121" font-family="Georgia, serif" font-size="7" fill="#333" text-anchor="middle">2</text>
  <text x="655" y="122" font-family="Georgia, serif" font-size="8" fill="#333">Levantia Units</text>

  <circle cx="639" cy="138" r="7" fill="#F5E6D0" stroke="#333" stroke-width="1"/>
  <text x="639" y="141" font-family="Georgia, serif" font-size="7" fill="#333" text-anchor="middle">1</text>
  <text x="655" y="142" font-family="Georgia, serif" font-size="8" fill="#333">Solaria Units</text>

  <!-- ============ TITLE ============ -->
  <text x="400" y="495" font-family="Georgia, serif" font-size="9" fill="#999" text-anchor="middle">THUCYDIDES TRAP — Style Option A: Political Atlas</text>
</svg>