<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <title>Eastern Ereb Theater v2 -- Heartland-Nordostan Conflict</title>
  <desc>26-hex theater map. Pointy-top hexagons, s=25. Definitive theater layout.</desc>

  <defs>
    <!-- Occupied territory diagonal stripe overlay -->
    <pattern id="occ-stripe" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#D4A5A5"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#8B5E5E" stroke-width="2.5" stroke-opacity="0.4"/>
    </pattern>
    <!-- Drop shadow -->
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.2" flood-opacity="0.10"/>
    </filter>
  </defs>

  <style>
    .hex { stroke: #555; stroke-width: 1.2; filter: url(#shadow); }
    .hex-nord { fill: #D4A5A5; }
    .hex-occ { fill: url(#occ-stripe); }
    .hex-heart { fill: #A5C8A5; }
    .hex-bastion { fill: #A5C8A5; stroke: #DDA000; stroke-width: 3; }
    .hex-alliance { fill: #C8C8C8; }
    .hex-sea { fill: #B5CCE0; stroke: #7FAAC4; stroke-width: 1; }
    .lbl { font-family: 'Inter','Segoe UI',Arial,sans-serif; font-size: 8px; fill: #222; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
    .lbl-name { font-size: 9px; font-weight: bold; }
    .lbl-id { font-size: 6.5px; fill: #666; }
    .front-line { stroke: #C62828; stroke-width: 2.5; stroke-dasharray: 8 4; fill: none; }
    .title-text { font-family: 'Inter','Segoe UI',Arial,sans-serif; font-size: 18px; fill: #1A237E; font-weight: bold; text-anchor: middle; }
    .subtitle-text { font-family: 'Inter','Segoe UI',Arial,sans-serif; font-size: 10px; fill: #555; text-anchor: middle; }
    .legend-title { font-family: 'Inter',Arial,sans-serif; font-size: 9px; fill: #111; font-weight: bold; }
    .legend-text { font-family: 'Inter',Arial,sans-serif; font-size: 7.5px; fill: #333; }
  </style>

  <!-- Background -->
  <rect width="900" height="600" fill="#F5F8FC"/>

  <!-- Title Banner -->
  <rect x="0" y="0" width="900" height="52" fill="#1A237E" fill-opacity="0.06"/>
  <text x="450" y="24" class="title-text">EASTERN EREB THEATER</text>
  <text x="450" y="40" class="subtitle-text">Heartland-Nordostan Conflict | 26 Hexes | Active Front</text>

  <!--
    HEX MATH: pointy-top, s=25
    hex_w = sqrt(3)*25 = 43.301
    hex_h = 2*25 = 50
    col_spacing = 43.301
    row_spacing = 37.5
    odd-row offset = 21.651

    Origin offset: ox=180, oy=85
    cx = ox + col * 43.301 + (row%2) * 21.651
    cy = oy + row * 37.5

    Pointy-top hex vertices (from center cx,cy):
      (cx,        cy - 25)
      (cx + 21.65, cy - 12.5)
      (cx + 21.65, cy + 12.5)
      (cx,        cy + 25)
      (cx - 21.65, cy + 12.5)
      (cx - 21.65, cy - 12.5)
  -->

  <!-- ============================================================ -->
  <!-- ROW 1: ee_corridor(1,3), ee_occupied_2(1,4), ee_staging_1(1,5) -->
  <!-- ============================================================ -->

  <!-- ee_corridor (1,3) cx=180+3*43.301+21.651=331.554, cy=85+37.5=122.5 -->
  <polygon class="hex hex-nord" points="331.55,97.50 353.20,110.00 353.20,135.00 331.55,147.50 309.90,135.00 309.90,110.00"/>
  <text x="331.55" y="119.5" class="lbl lbl-name">N. Flank</text>
  <text x="331.55" y="129.5" class="lbl lbl-id">ee_corridor</text>

  <!-- ee_occupied_2 (1,4) cx=180+4*43.301+21.651=374.855, cy=122.5 -->
  <polygon class="hex hex-occ" points="374.86,97.50 396.51,110.00 396.51,135.00 374.86,147.50 353.21,135.00 353.21,110.00"/>
  <text x="374.86" y="119.5" class="lbl lbl-name">Occupied NE</text>
  <text x="374.86" y="129.5" class="lbl lbl-id">ee_occupied_2</text>

  <!-- ee_staging_1 (1,5) cx=180+5*43.301+21.651=418.156, cy=122.5 -->
  <polygon class="hex hex-nord" points="418.16,97.50 439.81,110.00 439.81,135.00 418.16,147.50 396.51,135.00 396.51,110.00"/>
  <text x="418.16" y="119.5" class="lbl lbl-name">Staging N</text>
  <text x="418.16" y="129.5" class="lbl lbl-id">ee_staging_1</text>

  <!-- ============================================================ -->
  <!-- ROW 2: ee_occupied_1(2,4), ee_staging_2(2,5) -->
  <!-- ============================================================ -->

  <!-- ee_occupied_1 (2,4) cx=180+4*43.301=353.204, cy=85+75=160 -->
  <polygon class="hex hex-occ" points="353.20,135.00 374.85,147.50 374.85,172.50 353.20,185.00 331.55,172.50 331.55,147.50"/>
  <text x="353.20" y="157.0" class="lbl lbl-name">Occupied NW</text>
  <text x="353.20" y="167.0" class="lbl lbl-id">ee_occupied_1</text>

  <!-- ee_staging_2 (2,5) cx=180+5*43.301=396.505, cy=160 -->
  <polygon class="hex hex-nord" points="396.51,135.00 418.16,147.50 418.16,172.50 396.51,185.00 374.86,172.50 374.86,147.50"/>
  <text x="396.51" y="157.0" class="lbl lbl-name">Staging C</text>
  <text x="396.51" y="167.0" class="lbl lbl-id">ee_staging_2</text>

  <!-- ============================================================ -->
  <!-- ROW 3: ee_bastion_approach(3,3), ee_occupied_3(3,4), ee_staging_3(3,5) -->
  <!-- ============================================================ -->

  <!-- ee_front_1 (3,2) cx=180+2*43.301+21.651=288.253, cy=85+112.5=197.5 -->
  <polygon class="hex hex-heart" points="288.25,172.50 309.90,185.00 309.90,210.00 288.25,222.50 266.60,210.00 266.60,185.00"/>
  <text x="288.25" y="194.5" class="lbl lbl-name">Front N</text>
  <text x="288.25" y="204.5" class="lbl lbl-id">ee_front_1</text>

  <!-- ee_bastion_approach (3,3) cx=180+3*43.301+21.651=331.554, cy=197.5 -->
  <polygon class="hex hex-nord" points="331.55,172.50 353.20,185.00 353.20,210.00 331.55,222.50 309.90,210.00 309.90,185.00"/>
  <text x="331.55" y="194.5" class="lbl lbl-name">Bastion App.</text>
  <text x="331.55" y="204.5" class="lbl lbl-id">ee_bastion_approach</text>

  <!-- ee_occupied_3 (3,4) cx=180+4*43.301+21.651=374.855, cy=197.5 -->
  <polygon class="hex hex-occ" points="374.86,172.50 396.51,185.00 396.51,210.00 374.86,222.50 353.21,210.00 353.21,185.00"/>
  <text x="374.86" y="194.5" class="lbl lbl-name">Occupied SW</text>
  <text x="374.86" y="204.5" class="lbl lbl-id">ee_occupied_3</text>

  <!-- ee_staging_3 (3,5) cx=180+5*43.301+21.651=418.156, cy=197.5 -->
  <polygon class="hex hex-nord" points="418.16,172.50 439.81,185.00 439.81,210.00 418.16,222.50 396.51,210.00 396.51,185.00"/>
  <text x="418.16" y="194.5" class="lbl lbl-name">Staging S</text>
  <text x="418.16" y="204.5" class="lbl lbl-id">ee_staging_3</text>

  <!-- ============================================================ -->
  <!-- ROW 4: ee_alliance(4,0), ee_west_1(4,1), ee_depth_1(4,2), ee_front_2(4,3), ee_bastion(4,4), ee_occupied_4(4,5) -->
  <!-- ============================================================ -->

  <!-- ee_alliance (4,0) cx=180+0*43.301=180.0, cy=85+150=235 -->
  <polygon class="hex hex-alliance" points="180.00,210.00 201.65,222.50 201.65,247.50 180.00,260.00 158.35,247.50 158.35,222.50"/>
  <text x="180.00" y="230.0" class="lbl lbl-name">Alliance</text>
  <text x="180.00" y="240.0" class="lbl lbl-id">ee_alliance</text>
  <!-- Shield icon -->
  <text x="180.00" y="252.0" font-family="Arial" font-size="10" text-anchor="middle" fill="#666">&#9956;</text>

  <!-- ee_west_1 (4,1) cx=180+1*43.301=223.301, cy=235 -->
  <polygon class="hex hex-heart" points="223.30,210.00 244.95,222.50 244.95,247.50 223.30,260.00 201.65,247.50 201.65,222.50"/>
  <text x="223.30" y="232.0" class="lbl lbl-name">Western Cor.</text>
  <text x="223.30" y="242.0" class="lbl lbl-id">ee_west_1</text>

  <!-- ee_depth_1 (4,2) cx=180+2*43.301=266.602, cy=235 -->
  <polygon class="hex hex-heart" points="266.60,210.00 288.25,222.50 288.25,247.50 266.60,260.00 244.95,247.50 244.95,222.50"/>
  <text x="266.60" y="232.0" class="lbl lbl-name">River Line N</text>
  <text x="266.60" y="242.0" class="lbl lbl-id">ee_depth_1</text>

  <!-- ee_front_2 (4,3) cx=180+3*43.301=309.903, cy=235 -->
  <polygon class="hex hex-heart" points="309.90,210.00 331.55,222.50 331.55,247.50 309.90,260.00 288.25,247.50 288.25,222.50"/>
  <text x="309.90" y="232.0" class="lbl lbl-name">Front W</text>
  <text x="309.90" y="242.0" class="lbl lbl-id">ee_front_2</text>

  <!-- ee_bastion (4,4) cx=180+4*43.301=353.204, cy=235 -->
  <polygon class="hex hex-bastion" points="353.20,210.00 374.85,222.50 374.85,247.50 353.20,260.00 331.55,247.50 331.55,222.50"/>
  <text x="353.20" y="229.0" class="lbl lbl-name" style="font-size:10px; fill:#8B6508;">THE</text>
  <text x="353.20" y="239.0" class="lbl lbl-name" style="font-size:10px; fill:#8B6508;">BASTION</text>
  <text x="353.20" y="249.0" class="lbl lbl-id">ee_bastion</text>

  <!-- ee_occupied_4 (4,5) cx=180+5*43.301=396.505, cy=235 -->
  <polygon class="hex hex-occ" points="396.51,210.00 418.16,222.50 418.16,247.50 396.51,260.00 374.86,247.50 374.86,222.50"/>
  <text x="396.51" y="232.0" class="lbl lbl-name">Occupied SE</text>
  <text x="396.51" y="242.0" class="lbl lbl-id">ee_occupied_4</text>

  <!-- ============================================================ -->
  <!-- ROW 5: ee_capital(5,1), ee_depth_2(5,2), ee_front_3(5,3), ee_front_4(5,4) -->
  <!-- ============================================================ -->

  <!-- ee_capital (5,1) cx=180+1*43.301+21.651=244.952, cy=85+187.5=272.5 -->
  <polygon class="hex hex-heart" points="244.95,247.50 266.60,260.00 266.60,285.00 244.95,297.50 223.30,285.00 223.30,260.00"/>
  <text x="244.95" y="267.5" class="lbl lbl-name" style="font-size:10px;">The Capital</text>
  <text x="244.95" y="279.5" class="lbl lbl-id">ee_capital</text>
  <!-- Star marker -->
  <text x="244.95" y="290.0" font-family="Arial" font-size="9" text-anchor="middle" fill="#2E7D32">&#9733;</text>

  <!-- ee_depth_2 (5,2) cx=180+2*43.301+21.651=288.253, cy=272.5 -->
  <polygon class="hex hex-heart" points="288.25,247.50 309.90,260.00 309.90,285.00 288.25,297.50 266.60,285.00 266.60,260.00"/>
  <text x="288.25" y="269.5" class="lbl lbl-name">River Line C</text>
  <text x="288.25" y="279.5" class="lbl lbl-id">ee_depth_2</text>

  <!-- ee_front_3 (5,3) cx=180+3*43.301+21.651=331.554, cy=272.5 -->
  <polygon class="hex hex-heart" points="331.55,247.50 353.20,260.00 353.20,285.00 331.55,297.50 309.90,285.00 309.90,260.00"/>
  <text x="331.55" y="269.5" class="lbl lbl-name">Front S</text>
  <text x="331.55" y="279.5" class="lbl lbl-id">ee_front_3</text>

  <!-- ee_front_4 (5,4) cx=180+4*43.301+21.651=374.855, cy=272.5 -->
  <polygon class="hex hex-heart" points="374.86,247.50 396.51,260.00 396.51,285.00 374.86,297.50 353.21,285.00 353.21,260.00"/>
  <text x="374.86" y="269.5" class="lbl lbl-name">Front E</text>
  <text x="374.86" y="279.5" class="lbl lbl-id">ee_front_4</text>

  <!-- ============================================================ -->
  <!-- ROW 6: ee_west_2(6,1), ee_depth_3(6,2), ee_peninsula(6,5) -->
  <!-- ============================================================ -->

  <!-- ee_west_2 (6,1) cx=180+1*43.301=223.301, cy=85+225=310 -->
  <polygon class="hex hex-heart" points="223.30,285.00 244.95,297.50 244.95,322.50 223.30,335.00 201.65,322.50 201.65,297.50"/>
  <text x="223.30" y="307.0" class="lbl lbl-name">Western Sup.</text>
  <text x="223.30" y="317.0" class="lbl lbl-id">ee_west_2</text>

  <!-- ee_depth_3 (6,2) cx=180+2*43.301=266.602, cy=310 -->
  <polygon class="hex hex-heart" points="266.60,285.00 288.25,297.50 288.25,322.50 266.60,335.00 244.95,322.50 244.95,297.50"/>
  <text x="266.60" y="307.0" class="lbl lbl-name">River Line S</text>
  <text x="266.60" y="317.0" class="lbl lbl-id">ee_depth_3</text>

  <!-- ee_peninsula (6,5) cx=180+5*43.301=396.505, cy=310 -->
  <polygon class="hex hex-occ" points="396.51,285.00 418.16,297.50 418.16,322.50 396.51,335.00 374.86,322.50 374.86,297.50"/>
  <text x="396.51" y="307.0" class="lbl lbl-name">Naval Base</text>
  <text x="396.51" y="317.0" class="lbl lbl-id">ee_peninsula</text>

  <!-- ============================================================ -->
  <!-- ROW 7: ee_south_1(7,2), ee_south_2(7,3), ee_sea_1(7,4), ee_sea_2(7,5) -->
  <!-- ============================================================ -->

  <!-- ee_south_1 (7,2) cx=180+2*43.301+21.651=288.253, cy=85+262.5=347.5 -->
  <polygon class="hex hex-heart" points="288.25,322.50 309.90,335.00 309.90,360.00 288.25,372.50 266.60,360.00 266.60,335.00"/>
  <text x="288.25" y="344.5" class="lbl lbl-name">Southern Sec.</text>
  <text x="288.25" y="354.5" class="lbl lbl-id">ee_south_1</text>

  <!-- ee_south_2 (7,3) cx=180+3*43.301+21.651=331.554, cy=347.5 -->
  <polygon class="hex hex-heart" points="331.55,322.50 353.20,335.00 353.20,360.00 331.55,372.50 309.90,360.00 309.90,335.00"/>
  <text x="331.55" y="344.5" class="lbl lbl-name">Southern Flank</text>
  <text x="331.55" y="354.5" class="lbl lbl-id">ee_south_2</text>

  <!-- ee_sea_1 (7,4) cx=180+4*43.301+21.651=374.855, cy=347.5 -->
  <polygon class="hex hex-sea" points="374.86,322.50 396.51,335.00 396.51,360.00 374.86,372.50 353.21,360.00 353.21,335.00"/>
  <text x="374.86" y="344.5" class="lbl lbl-name" style="fill:#4A708B;">S. Sea W</text>
  <text x="374.86" y="354.5" class="lbl lbl-id" style="fill:#4A708B;">ee_sea_1</text>

  <!-- ee_sea_2 (7,5) cx=180+5*43.301+21.651=418.156, cy=347.5 -->
  <polygon class="hex hex-sea" points="418.16,322.50 439.81,335.00 439.81,360.00 418.16,372.50 396.51,360.00 396.51,335.00"/>
  <text x="418.16" y="344.5" class="lbl lbl-name" style="fill:#4A708B;">S. Sea E</text>
  <text x="418.16" y="354.5" class="lbl lbl-id" style="fill:#4A708B;">ee_sea_2</text>

  <!-- ============================================================ -->
  <!-- FRONT LINE — red dashed path between Nordostan and Heartland -->
  <!-- ============================================================ -->
  <!--
    The front line traces the boundary between:
    Nordostan-controlled (corridor, bastion_approach, occupied_3, occupied_4)
    and Heartland-controlled (front_1, front_2, bastion, front_4)

    We trace shared hex edges as line segments.
  -->

  <!-- Front line segments: between Nordostan territory and Heartland territory -->
  <!-- ee_corridor / ee_front_1 border: shared edge on row 1-3 col 2-3 boundary -->
  <line x1="309.90" y1="185.00" x2="288.25" y2="172.50" class="front-line"/>
  <line x1="288.25" y1="172.50" x2="288.25" y2="147.50" class="front-line"/>

  <!-- ee_bastion_approach / ee_front_1 border -->
  <line x1="309.90" y1="210.00" x2="309.90" y2="185.00" class="front-line"/>

  <!-- ee_bastion_approach / ee_front_2 border -->
  <line x1="309.90" y1="210.00" x2="331.55" y2="222.50" class="front-line"/>

  <!-- ee_occupied_3 / ee_bastion border -->
  <line x1="353.21" y1="210.00" x2="331.55" y2="222.50" class="front-line"/>

  <!-- ee_occupied_4 / ee_bastion border: top edge of bastion facing occupied_4 -->
  <line x1="353.20" y1="210.00" x2="374.85" y2="222.50" class="front-line"/>

  <!-- ee_occupied_4 / ee_front_4 border -->
  <line x1="374.85" y1="247.50" x2="374.86" y2="247.50" class="front-line"/>
  <line x1="374.86" y1="247.50" x2="396.51" y2="260.00" class="front-line"/>
  <line x1="396.51" y1="260.00" x2="396.51" y2="285.00" class="front-line"/>

  <!-- ============================================================ -->
  <!-- LEGEND -->
  <!-- ============================================================ -->
  <rect x="560" y="75" width="310" height="300" rx="6" fill="white" fill-opacity="0.90" stroke="#aaa" stroke-width="0.5"/>
  <text x="575" y="95" class="legend-title" style="font-size:11px;">LEGEND</text>

  <!-- Nordostan -->
  <rect x="575" y="108" width="16" height="11" rx="1" fill="#D4A5A5" stroke="#666" stroke-width="0.5"/>
  <text x="597" y="117" class="legend-text">Nordostan (staging / rear)</text>

  <!-- Occupied -->
  <rect x="575" y="125" width="16" height="11" rx="1" fill="url(#occ-stripe)" stroke="#666" stroke-width="0.5"/>
  <text x="597" y="134" class="legend-text">Nordostan-occupied (former Heartland)</text>

  <!-- Heartland -->
  <rect x="575" y="142" width="16" height="11" rx="1" fill="#A5C8A5" stroke="#666" stroke-width="0.5"/>
  <text x="597" y="151" class="legend-text">Heartland (controlled)</text>

  <!-- Bastion -->
  <rect x="575" y="159" width="16" height="11" rx="1" fill="#A5C8A5" stroke="#DDA000" stroke-width="2.5"/>
  <text x="597" y="168" class="legend-text">The Bastion (fortified, +1 def)</text>

  <!-- Alliance -->
  <rect x="575" y="176" width="16" height="11" rx="1" fill="#C8C8C8" stroke="#666" stroke-width="0.5"/>
  <text x="597" y="185" class="legend-text">Alliance Border (Article 5, untouchable)</text>

  <!-- Water -->
  <rect x="575" y="193" width="16" height="11" rx="1" fill="#B5CCE0" stroke="#7FAAC4" stroke-width="0.5"/>
  <text x="597" y="202" class="legend-text">Sea hex (naval ops)</text>

  <!-- Front line -->
  <line x1="575" y1="216" x2="591" y2="216" stroke="#C62828" stroke-width="2.5" stroke-dasharray="5 3"/>
  <text x="597" y="219" class="legend-text">Active front line</text>

  <!-- Capital star -->
  <text x="581" y="236" font-family="Arial" font-size="11" text-anchor="middle" fill="#2E7D32">&#9733;</text>
  <text x="597" y="236" class="legend-text">Capital / political center</text>

  <!-- Supply route -->
  <text x="575" y="260" class="legend-title" style="font-size:8px;">SUPPLY ROUTES</text>
  <text x="575" y="272" class="legend-text">Heartland: Alliance -> West -> Capital -> Front</text>
  <text x="575" y="284" class="legend-text">Nordostan: North edge -> Staging -> Occupied -> Front</text>

  <!-- Theater info -->
  <text x="575" y="305" class="legend-title" style="font-size:8px;">GLOBAL HEX SOURCES</text>
  <text x="575" y="317" class="legend-text">heartland_1 (3,8), heartland_2 (4,9)</text>
  <text x="575" y="329" class="legend-text">nord_w1 (2,9), nord_w2 (3,9)</text>

  <!-- Compass -->
  <text x="830" y="420" font-family="Inter,Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle" font-weight="bold">N</text>
  <line x1="830" y1="425" x2="830" y2="445" stroke="#888" stroke-width="1"/>
  <polygon points="830,422 826,430 834,430" fill="#888"/>
  <text x="830" y="455" font-family="Inter,Arial,sans-serif" font-size="8" fill="#aaa" text-anchor="middle">S</text>

  <!-- Map credit -->
  <text x="450" y="590" font-family="Inter,Arial,sans-serif" font-size="8" fill="#999" text-anchor="middle">THE THUCYDIDES TRAP | Eastern Ereb Theater v2 | s=25 pointy-top hex grid</text>

</svg>
