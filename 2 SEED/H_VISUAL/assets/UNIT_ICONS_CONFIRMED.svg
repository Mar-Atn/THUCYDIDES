<svg xmlns="http://www.w3.org/2000/svg">
  <!--
    TTT CONFIRMED MILITARY UNIT ICONS
    Date: 2026-03-28
    All icons in 24x24 viewBox, monochrome, use currentColor or fill with country color.
    Selected from v1 (naval, air defense, jet, ICBM), v2 (drone/UAV), v6 (tank V4 sloped).
  -->

  <!-- NAVAL: Warship side profile (stepped superstructure) -->
  <!-- NOTE: Render 20% larger than ground units on maps (19px vs 16px) -->
  <symbol id="unit-naval" viewBox="0 0 24 24">
    <path d="M2 16 L4 12 L8 12 L8 10 L10 10 L10 8 L12 8 L12 6 L13 6 L13 8 L14 8 L14 10 L16 10 L16 12 L22 12 L22 14 L21 16 Z" fill="currentColor"/>
  </symbol>

  <!-- GROUND: Tank V4 Sloped Front Hull — facing RIGHT (attacker/default) -->
  <!-- NOTE: 3 fill paths (no stroke) + 1 outer outline path (stroke only, no fill) -->
  <!-- This prevents visible seams between turret/hull/tracks while maintaining outer border -->
  <symbol id="unit-ground-right" viewBox="0 0 24 24">
    <path d="M10 8 L18 8 L22 10 L22 11 L10 11 Z" fill="currentColor"/>
    <path d="M2 13 L5 11 L20 11 L21 13 L21 15 L3 15 Z" fill="currentColor"/>
    <path d="M2 15 L22 15 C22 18 20 19 18 19 L6 19 C4 19 2 18 2 15 Z" fill="currentColor"/>
    <path d="M10 8 L18 8 L22 10 L22 11 L21 11 L21 13 L21 15 L22 15 C22 18 20 19 18 19 L6 19 C4 19 2 18 2 15 L3 15 L3 13 L2 13 L5 11 L10 11 Z" fill="none" stroke="#fff" stroke-width="0.6" stroke-linejoin="round"/>
  </symbol>

  <!-- GROUND: Tank V4 Sloped Front Hull — facing LEFT (mirrored, for opposing force) -->
  <symbol id="unit-ground-left" viewBox="0 0 24 24">
    <path d="M14 8 L6 8 L2 10 L2 11 L14 11 Z" fill="currentColor"/>
    <path d="M22 13 L19 11 L4 11 L3 13 L3 15 L21 15 Z" fill="currentColor"/>
    <path d="M22 15 L2 15 C2 18 4 19 6 19 L18 19 C20 19 22 18 22 15 Z" fill="currentColor"/>
    <path d="M14 8 L6 8 L2 10 L2 11 L3 11 L3 13 L3 15 L2 15 C2 18 4 19 6 19 L18 19 C20 19 22 18 22 15 L21 15 L21 13 L22 13 L19 11 L14 11 Z" fill="none" stroke="#fff" stroke-width="0.6" stroke-linejoin="round"/>
  </symbol>

  <!-- TACTICAL AIR: Drone / UAV (tac-d from v1/v2 — with sensor dome) -->
  <symbol id="unit-tactical-air" viewBox="0 0 24 24">
    <path d="M12 6 L13 9 L22 12 L22 14 L13 12 L13 16 L15 18 L15 19 L12 18 L9 19 L9 18 L11 16 L11 12 L2 14 L2 12 L11 9 Z" fill="currentColor"/>
    <circle cx="12" cy="5" r="2" fill="currentColor"/>
  </symbol>

  <!-- AIR DEFENSE: Radar dish / protective umbrella (ad-a from v1) -->
  <symbol id="unit-air-defense" viewBox="0 0 24 24">
    <path d="M4 10 C4 5 8 2 12 2 C16 2 20 5 20 10 L18 10 C18 6 15.5 3.5 12 3.5 C8.5 3.5 6 6 6 10 Z" fill="currentColor"/>
    <rect x="11" y="9" width="2" height="11" fill="currentColor"/>
    <rect x="7" y="20" width="10" height="2" rx="1" fill="currentColor"/>
  </symbol>

  <!-- STRATEGIC MISSILES: ICBM vertical (strat-a from v1) -->
  <symbol id="unit-strategic-missile" viewBox="0 0 24 24">
    <path d="M12 1 L14.5 6 L14 6 L14 18 L16 18 L16 22 L8 22 L8 18 L10 18 L10 6 L9.5 6 Z" fill="currentColor"/>
  </symbol>
</svg>
